# GitHub Actions workflow for automated semantic versioning and releases.
# This workflow analyzes commit messages to determine version bumps and creates releases
# with pre-built k6 binaries containing the xk6-kv extension.

name: Release

# Trigger when:
# - Extension Check completes successfully for a push to the default branch
#   (auto semver path),
# - a version tag is pushed directly (tag release path),
# - release is started manually.
on:
  push:
    tags:
      - "v*"
  workflow_run:
    workflows: ["Extension Check"]
    types: [completed]
  # Allow manual release triggering when needed.
  workflow_dispatch:

# Grant write permissions to create releases and push tags.
permissions:
  contents: write # Required to create releases and push Git tags.

concurrency:
  group: release-${{ github.ref_name || github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  # Single release job for both automatic (default-branch workflow_run),
  # direct tag push, and manual triggers.
  release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    # Run only for:
    # - manual dispatch,
    # - direct tag push,
    # - successful workflow_run for default-branch pushes.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'push' &&
        startsWith(github.ref, 'refs/tags/v')
      ) ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        !startsWith(github.event.workflow_run.ref, 'refs/tags/') &&
        github.event.workflow_run.head_branch == github.event.repository.default_branch
      )
    steps:
      # Checkout the repository to access the local composite action.
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      # Use the reusable release composite action.
      - name: Execute release
        uses: ./.github/actions/release
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
