version: "3"

silent: true

vars:
  # -------------------------------
  # Platform Configuration
  # -------------------------------

  # Path separator per OS.
  PS: '{{fromSlash "/"}}'

  # Cross-platform mkdir/rm helpers.
  RMRF: '{{if eq OS "windows"}}powershell.exe -Command "Remove-Item -Force -Recurse -ErrorAction SilentlyContinue -Path{{else}}rm -rf{{end}}'
  RMRF_END: '{{if eq OS "windows"}}; exit 0"{{end}}'
  MKDIR: '{{if eq OS "windows"}}powershell.exe -Command "New-Item -ItemType Directory -Force -Path{{else}}mkdir -p{{end}}'
  MKDIR_END: '{{if eq OS "windows"}} | Out-Null"{{end}}'

  # -------------------------------
  # Project Directories
  # -------------------------------

  # Local bin & scripts dirs (kept in repo root).
  BIN_DIR: "{{.TASKFILE_DIR}}{{.PS}}bin"
  SCRIPTS_DIR: "{{.TASKFILE_DIR}}{{.PS}}scripts"

  # -------------------------------
  # Tool Versions
  # -------------------------------

  # Linting tool version.
  GOLANGCI_TAG: "v2.12.2"
  # k6 extension builder version.
  XK6_TAG: "v1.4.6"
  # Go vulnerability scanner version.
  GOVULNCHECK_TAG: "v1.3.0"
  # Go toolchain version used by security checks (must match go.mod).
  GO_VERSION: "1.25.11"

  # -------------------------------
  # Tool Binaries
  # -------------------------------

  GOLANGCI_BIN: "{{.BIN_DIR}}{{.PS}}golangci-lint{{exeExt}}"
  XK6_BIN: "{{.BIN_DIR}}{{.PS}}xk6{{exeExt}}"
  K6_BIN: "{{.BIN_DIR}}{{.PS}}k6{{exeExt}}"
  GOVULNCHECK_BIN: "{{.BIN_DIR}}{{.PS}}govulncheck{{exeExt}}"

  # -------------------------------
  # Version Detection
  # -------------------------------

  # Commands to check current versions of installed tools.
  GOLANGCI_CURRENT_TAG:
    sh: '{{if eq OS "windows"}}powershell -Command "try { if (Test-Path ''{{.GOLANGCI_BIN}}'') { \$output = & ''{{.GOLANGCI_BIN}}'' version; if (\$output -match ''version v?([0-9]+\.[0-9]+\.[0-9A-Za-z.-]+)'') { ''v'' + \$Matches[1] } } } catch { }; exit 0"{{else}}"{{.GOLANGCI_BIN}}" version 2> /dev/null | sed -nE ''s/.*version v?([0-9]+\.[0-9]+\.[0-9A-Za-z.-]+).*/v\1/p'' | head -n1 || true{{end}}'
  XK6_VERSION_OUTPUT:
    sh: '{{if eq OS "windows"}}powershell -Command "try { if (Test-Path ''{{.XK6_BIN}}'') { & ''{{.XK6_BIN}}'' version } } catch { }; exit 0"{{else}}"{{.XK6_BIN}}" version 2> /dev/null || true{{end}}'
  GOVULNCHECK_VERSION_OUTPUT:
    sh: '{{if eq OS "windows"}}powershell -Command "try { if (Test-Path ''{{.GOVULNCHECK_BIN}}'') { & ''{{.GOVULNCHECK_BIN}}'' -version } } catch { }; exit 0"{{else}}"{{.GOVULNCHECK_BIN}}" -version 2> /dev/null || true{{end}}'

  # Regex patterns to extract version numbers from tool outputs.
  XK6_CURRENT_TAG: '{{regexFind "v([0-9]+.){2}([0-9a-z])+" .XK6_VERSION_OUTPUT}}'
  GOVULNCHECK_CURRENT_TAG: '{{regexFind "v([0-9]+.){2}([0-9a-z])+" .GOVULNCHECK_VERSION_OUTPUT}}'

  # -------------------------------
  # E2E Test Configuration
  # -------------------------------

  # E2E defaults (can be overridden on CLI).
  VUS: "{{.VUS | default `40`}}"
  ITERATIONS: "{{.ITERATIONS | default `400`}}"

  # Dynamically list all e2e test scenarios from e2e/*.js files (space-separated).
  E2E_SCENARIOS:
    sh: |
      {{if eq OS "windows"}}
        powershell.exe -Command "Get-ChildItem e2e\*.js | Where-Object { \$_.BaseName -notlike 'common*' } | Select-Object -ExpandProperty BaseName"
      {{else}}
        ls e2e/*.js | xargs -n1 basename -s .js | grep -v '^common'
      {{end}}

tasks:
  # -------------------------------
  # Default Task
  # -------------------------------

  default:
    desc: "Show common tasks"
    cmds:
      - task -l

  # -------------------------------
  # Git Hooks
  # -------------------------------

  install-githooks:
    desc: "Configure Git hooks for this repository"
    cmds:
      - |
        echo "Setting up Git hooks..."
        git config --local core.hooksPath .githooks
        {{if ne OS "windows"}}
          chmod +x .githooks/commit-msg
        {{end}}
        echo "Git hooks configured successfully!"
        echo "Commit messages must now start with: fix:, feat:, or major:"

  remove-githooks:
    desc: "Disable Git hooks for this repository"
    cmds:
      - |
        echo "Disabling Git hooks..."
        git config --local --unset core.hooksPath || echo "Hooks path was not set"
        echo "Git hooks disabled. You can now use any commit message format."

  # -------------------------------
  # Version Management
  # -------------------------------

  version-check:
    desc: "Check what the next version would be based on commits"
    cmds:
      - |
        {{if eq OS "windows"}}
          powershell.exe -Command "git fetch --tags; if (\$LASTEXITCODE -ne 0) { Write-Host 'Warning: git fetch --tags failed; using local tags only.'; exit 0 }"
        {{else}}
          git fetch --tags || echo "Warning: git fetch --tags failed; using local tags only."
        {{end}}
      - |
        echo "Analyzing commits for version bump..."
        {{if eq OS "windows"}}
          powershell.exe -ExecutionPolicy Bypass -File "{{.SCRIPTS_DIR}}{{.PS}}semver_next.ps1"
        {{else}}
          bash "{{.SCRIPTS_DIR}}{{.PS}}semver_next.sh"
        {{end}}

  pin-tool-versions:
    desc: "Pin CI/local tool versions to current module releases"
    cmds:
      - go run "{{.SCRIPTS_DIR}}{{.PS}}pin_tool_versions.go"

  # -------------------------------
  # Tool Installation
  # -------------------------------

  ensure-bin:
    internal: true
    cmds:
      - "{{.MKDIR}} '{{.BIN_DIR}}'{{.MKDIR_END}}"

  install-lint:
    internal: true
    deps: [ensure-bin]
    cmds:
      - |
        # Only install if current version doesn't match desired version.
        {{if (not (eq .GOLANGCI_CURRENT_TAG .GOLANGCI_TAG))}}
          echo "Installing golangci-lint, version: {{.GOLANGCI_TAG}}..."
          {{if eq OS "windows"}}
            powershell.exe -Command "\$env:GOBIN = '{{.BIN_DIR}}'; go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{.GOLANGCI_TAG}}"
          {{else}}
            go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{.GOLANGCI_TAG}}
          {{end}}
        {{end}}
    env:
      GOBIN: "{{.BIN_DIR}}"

  install-xk6:
    internal: true
    deps: [ensure-bin]
    cmds:
      - |
        # Only install if current version doesn't match desired version.
        {{if (not (eq .XK6_CURRENT_TAG .XK6_TAG))}}
          echo "Installing xk6, version: {{.XK6_TAG}}..."
          {{if eq OS "windows"}}
            powershell.exe -Command "\$env:GOBIN = '{{.BIN_DIR}}'; go install go.k6.io/xk6/cmd/xk6@{{.XK6_TAG}}"
          {{else}}
            go install go.k6.io/xk6/cmd/xk6@{{.XK6_TAG}}
          {{end}}
        {{end}}
    env:
      GOBIN: "{{.BIN_DIR}}"

  install-govulncheck:
    internal: true
    deps: [ensure-bin]
    cmds:
      - |
        # Only install if current version doesn't match desired version.
        {{if (not (eq .GOVULNCHECK_CURRENT_TAG .GOVULNCHECK_TAG))}}
          echo "Installing govulncheck, version: {{.GOVULNCHECK_TAG}}..."
          {{if eq OS "windows"}}
            powershell.exe -Command "\$env:GOBIN = '{{.BIN_DIR}}'; go install golang.org/x/vuln/cmd/govulncheck@{{.GOVULNCHECK_TAG}}"
          {{else}}
            go install golang.org/x/vuln/cmd/govulncheck@{{.GOVULNCHECK_TAG}}
          {{end}}
        {{end}}
    env:
      GOBIN: "{{.BIN_DIR}}"

  install-tools:
    desc: "Install golangci-lint, xk6, and govulncheck"
    deps: [install-lint, install-xk6, install-govulncheck]

  # -------------------------------
  # Build
  # -------------------------------

  build-k6:
    desc: "Build k6 with the local xk6-kv extension into ./bin/k6"
    deps: [install-xk6, ensure-bin]
    cmds:
      - |
        {{if eq OS "windows"}}
          echo "Note: Building k6 requires CGO. If this fails, install gcc (MinGW-w64) or use WSL."
          powershell.exe -Command "\$env:CGO_ENABLED = '1'; \$MODULE_NAME = go list -m; Write-Host \"Building k6 with local \$MODULE_NAME...\"; & '{{.XK6_BIN}}' build --with \"\$MODULE_NAME=.\" -o '{{.K6_BIN}}'"
        {{else}}
          MODULE_NAME=$(go list -m)
          echo "Building k6 with local $MODULE_NAME..."
          "{{.XK6_BIN}}" build --with "$MODULE_NAME=." -o "{{.K6_BIN}}"
        {{end}}
    env:
      CGO_ENABLED: "1"

  # -------------------------------
  # Code Quality
  # -------------------------------

  lint-fix:
    desc: "Run golangci-lint with --fix"
    deps: [install-lint]
    cmds:
      - '"{{.GOLANGCI_BIN}}" config verify'
      - '"{{.GOLANGCI_BIN}}" run --fix'

  lint:
    desc: "Run golangci-lint"
    deps: [install-lint]
    cmds:
      - '"{{.GOLANGCI_BIN}}" config verify'
      - '"{{.GOLANGCI_BIN}}" run'

  vulncheck:
    desc: "Run govulncheck"
    deps: [install-govulncheck]
    cmds:
      - |
        {{if eq OS "windows"}}
          powershell.exe -Command "\$env:GOTOOLCHAIN = 'go{{.GO_VERSION}}'; & '{{.GOVULNCHECK_BIN}}' ./..."
        {{else}}
          GOTOOLCHAIN="go{{.GO_VERSION}}" "{{.GOVULNCHECK_BIN}}" ./...
        {{end}}

  xk6-lint-community:
    desc: "Run xk6 lint --preset community"
    deps: [install-xk6, install-govulncheck]
    cmds:
      - |
        {{if eq OS "windows"}}
          powershell.exe -Command "if (-not (Test-Path '{{.BIN_DIR}}{{.PS}}gosec.exe')) { \$env:GOBIN = '{{.BIN_DIR}}'; \$env:GOTOOLCHAIN = 'go{{.GO_VERSION}}'; go install github.com/securego/gosec/v2/cmd/gosec@latest }; \$env:PATH = '{{.BIN_DIR}};' + \$env:PATH; \$env:GOTOOLCHAIN = 'go{{.GO_VERSION}}'; & '{{.XK6_BIN}}' lint --preset community ."
        {{else}}
          if [ ! -x "{{.BIN_DIR}}/gosec" ]; then
            GOBIN="{{.BIN_DIR}}" GOTOOLCHAIN="go{{.GO_VERSION}}" go install github.com/securego/gosec/v2/cmd/gosec@latest
          fi
          PATH="{{.BIN_DIR}}:$PATH" GOTOOLCHAIN="go{{.GO_VERSION}}" "{{.XK6_BIN}}" lint --preset community .
        {{end}}

  # -------------------------------
  # Unit Testing
  # -------------------------------

  test:
    desc: "Run unit tests"
    cmds:
      - go test -v ./...

  test-race:
    desc: "Run unit tests with race detector"
    cmds:
      - |
        {{if eq OS "windows"}}
          powershell.exe -Command "if (Get-Command gcc -ErrorAction SilentlyContinue) { \$env:CGO_ENABLED = '1'; go test -race -v ./... } else { Write-Host 'Warning: gcc not found on Windows; running non-race tests instead.'; \$env:CGO_ENABLED = '0'; go test -v ./... }"
        {{else}}
          go test -race -v ./...
        {{end}}
    env:
      CGO_ENABLED: "1"

  test-typescript:
    desc: "Run TypeScript declaration smoke tests"
    dir: typescript
    cmds:
      - |
        {{if eq OS "windows"}}
          powershell.exe -Command "\$npmCmd = ''; \$npmPath = (Get-Command npm -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source -ErrorAction SilentlyContinue); if (\$npmPath) { \$npmCmd = \$npmPath }; if (-not \$npmCmd) { \$candidate = Join-Path \$env:ProgramFiles 'nodejs\npm.cmd'; if (Test-Path \$candidate) { \$npmCmd = \$candidate } }; if (-not \$npmCmd) { throw 'npm not found. Install Node.js LTS and ensure npm is available.' }; \$nodeDir = Split-Path -Parent \$npmCmd; \$env:PATH = \"\$nodeDir;\$env:PATH\"; & \$npmCmd ci; if (\$LASTEXITCODE -ne 0) { exit \$LASTEXITCODE }; & \$npmCmd test; exit \$LASTEXITCODE"
        {{else}}
          npm ci
          npm test
        {{end}}

  release-check:
    desc: "Run full release readiness checks"
    cmds:
      - task lint
      - task xk6-lint-community
      - task test-race
      - task test-typescript
      - |
        {{if eq OS "windows"}}
          powershell.exe -ExecutionPolicy Bypass -File "{{.SCRIPTS_DIR}}{{.PS}}release_check_e2e.ps1"
        {{else}}
          bash "{{.SCRIPTS_DIR}}{{.PS}}release_check_e2e.sh"
        {{end}}

  # -------------------------------
  # E2E Testing
  # -------------------------------

  test-e2e-all:
    desc: "Run all E2E tests sequentially (all backends + key tracking combinations)"
    deps: [build-k6]
    cmds:
      - for: { var: E2E_SCENARIOS }
        task: test-e2e-single
        vars: { E2E_SCENARIO: "{{.ITEM}}" }

  test-e2e-single:
    desc: "Run one E2E scenario across backend and key-tracking combinations"
    vars:
      E2E_SCENARIO: "{{.E2E_SCENARIO | default `api-output-validation`}}"
    cmds:
      - |
        {{if eq OS "windows"}}
          powershell.exe -ExecutionPolicy Bypass \
            -File "{{.SCRIPTS_DIR}}{{.PS}}run_e2e_scenario.ps1" \
            -Scenario "{{.E2E_SCENARIO}}" \
            -K6Bin "{{.K6_BIN}}" \
            -Vus "{{.VUS}}" \
            -Iterations "{{.ITERATIONS}}"
        {{else}}
          bash "{{.SCRIPTS_DIR}}{{.PS}}run_e2e_scenario.sh" \
            "{{.E2E_SCENARIO}}" \
            "{{.K6_BIN}}" \
            "{{.VUS}}" \
            "{{.ITERATIONS}}"
        {{end}}

  # -------------------------------
  # Cleanup
  # -------------------------------

  clean:
    desc: "Remove generated binaries and repository-local temporary artifacts"
    cmds:
      - "{{.RMRF}} '{{.BIN_DIR}}'{{.RMRF_END}}"
      - "{{.RMRF}} tmp{{.RMRF_END}}"
      - "{{.RMRF}} .k6.kv{{.RMRF_END}}"
