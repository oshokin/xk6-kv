version: "3"

silent: true

vars:
  # Path separator per OS.
  PS: '{{fromSlash "/"}}'
  # Windows needs .exe suffix for binaries.
  EXE: '{{if eq OS "windows"}}.exe{{else}}{{end}}'

  # Cross-platform mkdir/rm helpers.
  RMRF: '{{if eq OS "windows"}}powershell Remove-Item -Force -Recurse -ErrorAction SilentlyContinue{{else}}rm -rf{{end}}'
  MKDIR: '{{if eq OS "windows"}}powershell New-Item -ItemType Directory -Force{{else}}mkdir -p{{end}}'

  # Local bin & temp dirs (kept in repo root).
  BIN_DIR: "{{.TASKFILE_DIR}}{{.PS}}bin"

  # Tool binaries.
  GOFUMPT_BIN: "{{.BIN_DIR}}{{.PS}}gofumpt{{.EXE}}"
  GOLANGCI_BIN: "{{.BIN_DIR}}{{.PS}}golangci-lint{{.EXE}}"
  XK6_BIN: "{{.BIN_DIR}}{{.PS}}xk6{{.EXE}}"
  K6_BIN: "{{.BIN_DIR}}{{.PS}}k6{{.EXE}}"

  # Default ref of this fork to build with (tag/branch/commit).
  KV_FORK_REF: "{{.KV_FORK_REF | default `latest`}}"

  # Default JS scenario path for e2e/integration.
  # Change at runtime: `task test:e2e:all E2E_JS="e2e/get-or-set.js"`.
  E2E_JS: "{{.E2E_JS | default (printf `e2e%sget-or-set.js` .PS)}}"

  # e2e defaults (can be overridden on CLI).
  VUS: "{{.VUS | default `50`}}"
  ITERATIONS: "{{.ITERATIONS | default `1000`}}"
  TOTAL_FAKE_ORDERS: "{{.TOTAL_FAKE_ORDERS | default `1000`}}"
  RETRY_WAIT_MS: "{{.RETRY_WAIT_MS | default `50`}}"
  MAX_RETRY: "{{.MAX_RETRY | default `5`}}"

tasks:
  default:
    desc: "Show common tasks"
    cmds:
      - task -l

  _ensure:bin:
    internal: true
    cmds:
      - '{{.MKDIR}} "{{.BIN_DIR}}"'

  install:gofumpt:
    desc: "Install gofumpt into ./bin"
    deps: [_ensure:bin]
    cmds:
      - |
        echo "Installing gofumpt..."
        GOBIN="{{.BIN_DIR}}" go install mvdan.cc/gofumpt@latest

  install:golangci:
    desc: "Install golangci-lint into ./bin"
    deps: [_ensure:bin]
    cmds:
      - |
        echo "Installing golangci-lint..."
        GOBIN="{{.BIN_DIR}}" go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

  install:xk6:
    desc: "Install xk6 into ./bin"
    deps: [_ensure:bin]
    cmds:
      - |
        echo "Installing xk6..."
        GOBIN="{{.BIN_DIR}}" go install go.k6.io/xk6/cmd/xk6@latest

  install:tools:
    desc: "Install gofumpt, golangci-lint, and xk6"
    deps: [install:gofumpt, install:golangci, install:xk6]

  build:k6:
    desc: "Build k6 with github.com/oshokin/xk6-kv@{{.KV_FORK_REF}} into ./bin/k6"
    deps: [install:xk6, _ensure:bin]
    cmds:
      - >
        "{{.XK6_BIN}}" build
        --with github.com/oshokin/xk6-kv@{{.KV_FORK_REF}}
        -o "{{.K6_BIN}}"

  fmt:
    desc: "Format with gofumpt"
    deps: [install:gofumpt]
    cmds:
      - '"{{.GOFUMPT_BIN}}" -l -w .'

  lint:fix:
    desc: "Run golangci-lint with --fix"
    deps: [install:golangci]
    cmds:
      - '"{{.GOLANGCI_BIN}}" run --fix'

  lint:
    desc: "Run golangci-lint (no fix)"
    deps: [install:golangci]
    cmds:
      - '"{{.GOLANGCI_BIN}}" run'

  test:e2e:memory:no-track:
    desc: "Run e2e: memory backend, trackKeys=false"
    deps: [build:k6]
    cmds:
      - '"{{.K6_BIN}}" run "{{.E2E_JS}}"'
    env:
      KV_BACKEND: "memory"
      KV_TRACK_KEYS: "false"
      VUS: "{{.VUS}}"
      ITERATIONS: "{{.ITERATIONS}}"
      TOTAL_FAKE_ORDERS: "{{.TOTAL_FAKE_ORDERS}}"
      RETRY_WAIT_MS: "{{.RETRY_WAIT_MS}}"
      MAX_RETRY: "{{.MAX_RETRY}}"
      LOG_CLAIMS: "false"

  test:e2e:memory:track:
    desc: "Run e2e: memory backend, trackKeys=true"
    deps: [build:k6]
    cmds:
      - '"{{.K6_BIN}}" run "{{.E2E_JS}}"'
    env:
      KV_BACKEND: "memory"
      KV_TRACK_KEYS: "true"
      VUS: "{{.VUS}}"
      ITERATIONS: "{{.ITERATIONS}}"
      TOTAL_FAKE_ORDERS: "{{.TOTAL_FAKE_ORDERS}}"
      RETRY_WAIT_MS: "{{.RETRY_WAIT_MS}}"
      MAX_RETRY: "{{.MAX_RETRY}}"
      LOG_CLAIMS: "false"

  test:e2e:disk:no-track:
    desc: "Run e2e: disk backend, trackKeys=false"
    deps: [build:k6]
    cmds:
      - '"{{.K6_BIN}}" run "{{.E2E_JS}}"'
    env:
      KV_BACKEND: "disk"
      KV_TRACK_KEYS: "false"
      VUS: "{{.VUS}}"
      ITERATIONS: "{{.ITERATIONS}}"
      TOTAL_FAKE_ORDERS: "{{.TOTAL_FAKE_ORDERS}}"
      RETRY_WAIT_MS: "{{.RETRY_WAIT_MS}}"
      MAX_RETRY: "{{.MAX_RETRY}}"
      LOG_CLAIMS: "false"

  test:e2e:disk:track:
    desc: "Run e2e: disk backend, trackKeys=true"
    deps: [build:k6]
    cmds:
      - '"{{.K6_BIN}}" run "{{.E2E_JS}}"'
    env:
      KV_BACKEND: "disk"
      KV_TRACK_KEYS: "true"
      VUS: "{{.VUS}}"
      ITERATIONS: "{{.ITERATIONS}}"
      TOTAL_FAKE_ORDERS: "{{.TOTAL_FAKE_ORDERS}}"
      RETRY_WAIT_MS: "{{.RETRY_WAIT_MS}}"
      MAX_RETRY: "{{.MAX_RETRY}}"
      LOG_CLAIMS: "false"

  test:
    desc: "Run unit tests"
    cmds:
      - go test -v ./...

  test:race:
    desc: "Run unit tests with race detector"
    cmds:
      - go test -race -v ./...

  clean:
    desc: "Remove binaries and temporary files"
    cmds:
      - '{{.RMRF}} "{{.BIN_DIR}}"'
      - '{{.RMRF}} ".k6.kv"'
